<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Помощь</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A56E8;--blue-d:#1340BE;--blue-l:#EEF3FD;--blue-m:#C4D4FA;--bg:#F5F7FB;--white:#fff;--border:#E2E8F0;--text:#0F172A;--muted:#64748B;--green:#16A34A;--gbg:#DCFCE7;--yellow:#CA8A04;--ybg:#FEF9C3;--red:#DC2626;--rbg:#FEE2E2;--r:10px;--sh:0 1px 3px rgba(0,0,0,.08)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh)}
.tb-in{max-width:720px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.03em}
.logo-m{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.nav{display:flex;gap:2px}
.nav a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .12s}
.nav a:hover{color:var(--text);background:var(--bg)}
.nav a.on{color:var(--blue);background:var(--blue-l);font-weight:600}
.uchip{display:flex;align-items:center;gap:7px}
.av{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.uname{font-size:13px;font-weight:600}
.logout-btn{background:none;border:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px}
.logout-btn:hover{color:var(--red)}

.page{max-width:720px;margin:0 auto;padding:32px 20px 80px}

/* hero */
.hero{background:var(--blue);border-radius:14px;padding:28px 32px;margin-bottom:28px;color:#fff}
.hero-title{font-size:22px;font-weight:800;letter-spacing:-0.02em;margin-bottom:6px}
.hero-sub{font-size:14px;opacity:.8}

/* section */
.section{margin-bottom:10px}
.sec-header{display:flex;align-items:center;gap:10px;padding:14px 20px;cursor:pointer;user-select:none;background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);transition:background .12s}
.sec-header:hover{background:var(--blue-l)}
.sec-header.open{border-radius:var(--r) var(--r) 0 0;border-bottom:none}
.sec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sec-title{font-size:14px;font-weight:700;flex:1}
.sec-arrow{font-size:18px;color:var(--muted);transition:transform .2s}
.sec-header.open .sec-arrow{transform:rotate(90deg)}
.sec-body{background:var(--white);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);padding:20px 24px;display:none}
.sec-body.open{display:block}

/* steps */
.steps{list-style:none;counter-reset:step}
.steps li{counter-increment:step;display:flex;gap:14px;margin-bottom:16px;align-items:flex-start}
.steps li:last-child{margin-bottom:0}
.step-num{width:26px;height:26px;border-radius:50%;background:var(--blue);color:#fff;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.step-text{font-size:14px;line-height:1.6;color:var(--text)}
.step-text b{color:var(--blue)}

/* tip box */
.tip{background:var(--blue-l);border-left:3px solid var(--blue);border-radius:0 8px 8px 0;padding:10px 14px;margin:14px 0;font-size:13px;color:var(--text)}
.warn{background:var(--ybg);border-left:3px solid var(--yellow);border-radius:0 8px 8px 0;padding:10px 14px;margin:14px 0;font-size:13px}

/* mode pills */
.mode-row{display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap}
.mpill{padding:6px 14px;border-radius:20px;font-size:13px;font-weight:600}
.mpill-add{background:var(--blue-l);color:var(--blue)}
.mpill-set{background:#F1F5F9;color:var(--muted)}

/* faq */
.faq-item{border-bottom:1px solid var(--border);padding:14px 0}
.faq-item:last-child{border-bottom:none}
.faq-q{font-size:14px;font-weight:600;margin-bottom:6px}
.faq-a{font-size:13px;color:var(--muted);line-height:1.6}

/* legend table */
.ltable{width:100%;border-collapse:collapse;margin:10px 0;font-size:13px}
.ltable td{padding:7px 10px;border-bottom:1px solid var(--border)}
.ltable tr:last-child td{border-bottom:none}
.ltable td:first-child{font-weight:600;white-space:nowrap}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;vertical-align:middle}

/* head-only sections */
.head-badge{display:inline-block;background:var(--ybg);color:var(--yellow);font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;text-transform:uppercase;letter-spacing:.05em;margin-left:6px}

@media(max-width:480px){.hero{padding:20px}.uname{display:none}}
</style>
</head>
<body>

<nav class="topbar">
  <div class="tb-in">
    <a class="logo" href="index.html"><div class="logo-m">D</div>Diskurs</a>
    <div class="nav" id="nav"></div>
    <div class="uchip">
      <div class="av" id="av">?</div>
      <span class="uname" id="uname"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="hero">
    <div class="hero-title" id="heroTitle">Как пользоваться приложением</div>
    <div class="hero-sub" id="heroSub">Пошаговая инструкция</div>
  </div>

  <div id="contentArea"></div>
</div>

<script>
const Auth = { get(){try{return JSON.parse(sessionStorage.getItem('dsk_user'));}catch{return null;}}, clear(){sessionStorage.removeItem('dsk_user');} };

const user = Auth.get();
if (!user) { window.location.href='index.html'; }
else { init(); }

function init() {
  document.getElementById('av').textContent = user.name.charAt(0).toUpperCase();
  document.getElementById('uname').textContent = user.name;
  document.getElementById('heroSub').textContent = 'Привет, ' + user.name + '! Здесь всё, что нужно знать для работы.';

  const nav = document.getElementById('nav');
  if (user.role === 'head') {
    nav.innerHTML = '<a href="projects.html">Проекты</a><a href="status.html">Статус</a><a href="head.html">Хэд</a><a href="settings.html">Настройки</a><a class="on" href="help.html">Помощь</a>';
    document.getElementById('heroTitle').textContent = 'Инструкция для руководителя';
    renderHead();
  } else if (user.role === 'viewer') {
    nav.innerHTML = '<a href="status.html">Статус</a><a href="head.html">Хэд</a><a href="settings.html">Настройки</a><a class="on" href="help.html">Помощь</a>';
    renderViewer();
  } else {
    nav.innerHTML = '<a href="projects.html">Проекты</a><a href="status.html">Статус</a><a href="settings.html">Настройки</a><a class="on" href="help.html">Помощь</a>';
    renderContent();
  }
}

function section(icon, color, title, bodyHtml, headOnly) {
  const id = 'sec_' + Math.random().toString(36).slice(2);
  const badge = headOnly ? '<span class="head-badge">только хэд</span>' : '';
  return `
  <div class="section">
    <div class="sec-header" onclick="toggle('${id}')">
      <div class="sec-icon" style="background:${color}20">${icon}</div>
      <div class="sec-title">${title}${badge}</div>
      <div class="sec-arrow">›</div>
    </div>
    <div class="sec-body" id="${id}">${bodyHtml}</div>
  </div>`;
}

function toggle(id) {
  const body = document.getElementById(id);
  const header = body.previousElementSibling;
  body.classList.toggle('open');
  header.classList.toggle('open');
}

// ── КОНТЕНТ-МЕНЕДЖЕР ──
function renderContent() {
  document.getElementById('contentArea').innerHTML =
    section('🔐', '#1A56E8', 'Вход в приложение', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Открой ссылку на приложение в браузере</div></li>
        <li><div class="step-num">2</div><div class="step-text">Введи свой <b>логин</b> и <b>пароль</b> (выдаёт Ника)</div></li>
        <li><div class="step-num">3</div><div class="step-text">Нажми кнопку <b>Войти</b> — откроется список твоих проектов</div></li>
      </ol>
      <div class="tip">Если забыла пароль — напиши Нике</div>
    `) +

    section('📋', '#16A34A', 'Как внести факт публикаций', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">На главной странице нажми на нужный <b>проект</b> из списка</div></li>
        <li><div class="step-num">2</div><div class="step-text">Вверху карточки увидишь <b>прогресс за месяц</b> — сколько сделано из плана по каждому типу контента</div></li>
        <li><div class="step-num">3</div><div class="step-text">В поле <b>Дата публикации</b> стоит сегодняшняя дата. Если нужно внести за другой день — нажми на дату и выбери нужную из календаря. Кнопка <b>Сегодня</b> вернёт обратно на сегодня</div></li>
        <li><div class="step-num">4</div><div class="step-text">Посмотри подсказку под датой — там написано, что уже внесено за этот день. Если подсказки нет — за этот день ещё ничего не записано</div></li>
        <li><div class="step-num">5</div><div class="step-text">Выбери режим:
          <div class="mode-row">
            <span class="mpill mpill-add">+ Добавить</span>
            <span class="mpill mpill-set">Заменить</span>
          </div>
          <b>Добавить</b> — прибавит к тому, что уже есть (например, утром внесла 1 пост, вечером ещё 1 — итого станет 2)<br>
          <b>Заменить</b> — полностью заменит записанное значение на новое
        </div></li>
        <li><div class="step-num">6</div><div class="step-text">Нажимай <b>+</b> и <b>−</b> у каждого типа контента, чтобы выставить нужное число:<br>
          <b>Статика</b> — посты-картинки &nbsp;|&nbsp; <b>Reels</b> — видео &nbsp;|&nbsp; <b>Сторис</b> — сторис</div></li>
        <li><div class="step-num">7</div><div class="step-text">Нажми кнопку <b>Сохранить</b> — прогресс наверху обновится автоматически ✓</div></li>
      </ol>
    `) +

    section('✏️', '#CA8A04', 'Как исправить ошибку', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Открой проект и выбери ту дату, в которой допустила ошибку</div></li>
        <li><div class="step-num">2</div><div class="step-text">Под датой увидишь подсказку с тем, что сейчас записано</div></li>
        <li><div class="step-num">3</div><div class="step-text">Переключись на режим <b>Заменить</b></div></li>
        <li><div class="step-num">4</div><div class="step-text">Выставь правильные числа через <b>+</b> и <b>−</b></div></li>
        <li><div class="step-num">5</div><div class="step-text">Нажми <b>Сохранить</b> — старые данные заменятся на новые</div></li>
      </ol>
    `) +

    section('❓', '#64748B', 'Частые вопросы', `
      <div class="faq-item">
        <div class="faq-q">Внесла факт, но прогресс не изменился?</div>
        <div class="faq-a">Обнови страницу (нажми F5 или потяни страницу вниз на телефоне)</div>
      </div>
      <div class="faq-item">
        <div class="faq-q">Данные не загружаются, крутится колёсико?</div>
        <div class="faq-a">Подожди 10–15 секунд — иногда сервер отвечает медленно. Если не помогло — обнови страницу</div>
      </div>
      <div class="faq-item">
        <div class="faq-q">Не могу войти — «Неверный логин или пароль»?</div>
        <div class="faq-a">Проверь, что вводишь строчными буквами (логин и пароль чувствительны к регистру). Если всё равно не работает — напиши Нике</div>
      </div>
      <div class="faq-item">
        <div class="faq-q">Как выйти из приложения?</div>
        <div class="faq-a">Нажми кнопку <b>Выйти</b> в правом верхнем углу</div>
      </div>
    `);
}

// ── ЛЕРА (HEAD) ──
function renderHead() {
  document.getElementById('contentArea').innerHTML =
    section('🔐', '#1A56E8', 'Вход в приложение', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Открой ссылку на приложение в браузере</div></li>
        <li><div class="step-num">2</div><div class="step-text">Введи свой <b>логин</b> и <b>пароль</b></div></li>
        <li><div class="step-num">3</div><div class="step-text">Нажми <b>Войти</b> — откроется список проектов. Вверху страницы — меню с разделами: <b>Проекты / Статус / Хэд / Помощь</b></div></li>
      </ol>
    `) +

    section('📋', '#16A34A', 'Раздел «Проекты» — внести факт', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Нажми на нужный <b>проект</b> из списка</div></li>
        <li><div class="step-num">2</div><div class="step-text">В поле <b>Дата публикации</b> стоит сегодня. Чтобы внести за другой день — нажми на дату и выбери из календаря</div></li>
        <li><div class="step-num">3</div><div class="step-text">Под датой — подсказка с тем, что уже записано за этот день</div></li>
        <li><div class="step-num">4</div><div class="step-text">Выбери режим <b>Добавить</b> (прибавить к существующему) или <b>Заменить</b> (перезаписать)</div></li>
        <li><div class="step-num">5</div><div class="step-text">Выставь числа кнопками <b>+</b> / <b>−</b> и нажми <b>Сохранить</b></div></li>
      </ol>
    `) +

    section('📊', '#1A56E8', 'Раздел «Статус» — общая картина', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Нажми <b>Статус</b> в меню вверху — загрузится таблица со всеми проектами</div></li>
        <li><div class="step-num">2</div><div class="step-text">Нажимай кнопки-фильтры над таблицей:<br>
          <b>Все</b> — показать все проекты<br>
          <b>С долгами</b> — проекты, где выполнено меньше плана<br>
          <b>Отстают</b> — объём сильно отстаёт от времени<br>
          <b>В норме</b> — всё идёт хорошо
        </div></li>
        <li><div class="step-num">3</div><div class="step-text">Полоска «Время» — сколько месяца прошло. Полоска «Объём» — сколько контента сделано из плана</div></li>
        <li><div class="step-num">4</div><div class="step-text">Цвет полоски:
          <table class="ltable" style="margin-top:8px">
            <tr><td><span class="dot" style="background:#1A56E8"></span>Синяя</td><td>всё идёт по плану</td></tr>
            <tr><td><span class="dot" style="background:#CA8A04"></span>Жёлтая</td><td>небольшое отставание</td></tr>
            <tr><td><span class="dot" style="background:#DC2626"></span>Красная</td><td>сильное отставание</td></tr>
          </table>
        </div></li>
        <li><div class="step-num">5</div><div class="step-text">Нажми кнопку <b>Обновить</b> — загрузит свежие данные из таблицы</div></li>
      </ol>
      <div class="tip">Расчётный день с красной плашкой — период истёк, нужно обновить данные в таблице</div>
    `) +

    section('📈', '#CA8A04', 'Раздел «Хэд» — детали по типам контента', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Нажми <b>Хэд</b> в меню — откроется детальная таблица со всеми проектами</div></li>
        <li><div class="step-num">2</div><div class="step-text">Чтобы найти нужный проект — начни вводить его название в поле <b>Поиск</b>, таблица отфильтруется автоматически</div></li>
        <li><div class="step-num">3</div><div class="step-text">Меняй сортировку через выпадающий список:<br>
          <b>По долгам</b> — сначала те, у кого больше всего долгов<br>
          <b>По названию</b> — алфавитный порядок<br>
          <b>По прогрессу</b> — сначала те, кто меньше всего выполнил
        </div></li>
        <li><div class="step-num">4</div><div class="step-text">В таблице три группы колонок:<br>
          <b>План</b> — сколько должно быть сделано за месяц<br>
          <b>Долг → след. мес</b> — сколько переходит на следующий месяц<br>
          <b>Выполнено</b> — сколько уже сделано
        </div></li>
        <li><div class="step-num">5</div><div class="step-text">Цвет цифр в колонке «Долг»:<br>
          <span style="color:#DC2626;font-weight:700">Красный</span> — есть долг, нужно доделать<br>
          <span style="color:#16A34A;font-weight:600">Зелёный</span> — нет долга или перевыполнение
        </div></li>
      </ol>
    `) +

    section('❓', '#64748B', 'Частые вопросы', `
      <div class="faq-item">
        <div class="faq-q">Данные не загружаются?</div>
        <div class="faq-a">Подожди 10–15 секунд и нажми кнопку «Обновить». Если не помогло — обнови страницу (F5)</div>
      </div>
      <div class="faq-item">
        <div class="faq-q">Исправить ошибочно внесённый факт?</div>
        <div class="faq-a">Зайди в Проекты → выбери проект → выбери нужную дату → переключись на режим «Заменить» → введи правильное число → Сохранить</div>
      </div>
      <div class="faq-item">
        <div class="faq-q">Как выйти из приложения?</div>
        <div class="faq-a">Нажми кнопку «Выйти» в правом верхнем углу</div>
      </div>
    `);
}

// ── VIEWER ──
function renderViewer() {
  document.getElementById('contentArea').innerHTML =
    section('📊', '#1A56E8', 'Раздел «Статус»', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Нажми <b>Статус</b> в меню — увидишь таблицу по всем проектам</div></li>
        <li><div class="step-num">2</div><div class="step-text">Используй фильтры над таблицей: <b>Все / С долгами / Отстают / В норме</b></div></li>
        <li><div class="step-num">3</div><div class="step-text">Нажми <b>Обновить</b> чтобы загрузить свежие данные</div></li>
      </ol>
    `) +
    section('📈', '#CA8A04', 'Раздел «Хэд»', `
      <ol class="steps">
        <li><div class="step-num">1</div><div class="step-text">Нажми <b>Хэд</b> в меню — детальная таблица с планом и прогрессом по каждому типу контента</div></li>
        <li><div class="step-num">2</div><div class="step-text">Используй поиск и сортировку чтобы найти нужные проекты</div></li>
      </ol>
    `);
}

function logout() { Auth.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
