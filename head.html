<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Хэд</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A56E8;--blue-d:#1340BE;--blue-l:#EEF3FD;--blue-m:#C4D4FA;--bg:#F5F7FB;--white:#fff;--border:#E2E8F0;--text:#0F172A;--muted:#64748B;--green:#16A34A;--gbg:#DCFCE7;--yellow:#CA8A04;--ybg:#FEF9C3;--red:#DC2626;--rbg:#FEE2E2;--r:10px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh)}
.tb-in{max-width:1200px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.03em}
.logo-m{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.nav{display:flex;gap:2px}
.nav a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .12s}
.nav a:hover{color:var(--text);background:var(--bg)}
.nav a.on{color:var(--blue);background:var(--blue-l);font-weight:600}
.uchip{display:flex;align-items:center;gap:7px}
.av{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.uname{font-size:13px;font-weight:600}
.logout-btn{background:none;border:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px}
.logout-btn:hover{color:var(--red)}
.page{max-width:1200px;margin:0 auto;padding:28px 20px 60px}
.ph{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:16px}
.ptitle{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.psub{font-size:13px;color:var(--muted);margin-top:3px}
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh)}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:14px}
.li{display:flex;align-items:center;gap:5px}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toolbar{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:16px}
.search-wrap{position:relative;flex:1;max-width:280px}
.search-wrap input{padding-left:32px;font-size:13px;padding-top:8px;padding-bottom:8px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none}
input,select{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,232,.09)}
select{width:auto;font-size:13px;padding:8px 12px}
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap}
th{text-align:center;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--border);background:var(--bg)}
th.tl{text-align:left}
th.gh{background:var(--blue-l);color:var(--blue)}
th.dh{background:var(--ybg);color:var(--yellow)}
th.dnh{background:var(--gbg);color:var(--green)}
td{padding:9px 10px;border-bottom:1px solid var(--border);text-align:center;vertical-align:middle}
td.tdl{text-align:left;font-weight:500;padding-left:16px;max-width:180px;white-space:normal;word-break:break-word}
td.tdd{font-size:11px;color:var(--muted)}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--blue-l)}
.nr{font-weight:600}
.nred{color:var(--red);font-weight:700}
.ngrn{color:var(--green);font-weight:600}
.ngry{color:var(--muted)}
.bexp{background:var(--rbg);color:var(--red);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;display:inline-block}
.bok{background:var(--blue-l);color:var(--blue);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:600;display:inline-block}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;white-space:nowrap}
.btn-o{background:var(--white);color:var(--blue);border:1.5px solid var(--blue-m)}
.btn-o:hover{background:var(--blue-l)}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:var(--sh);width:fit-content}
.tab{padding:7px 18px;border-radius:7px;border:none;background:transparent;font-family:inherit;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;transition:all .15s}
.tab.on{background:var(--blue);color:#fff;font-weight:600;box-shadow:0 2px 6px rgba(26,86,232,.25)}
.sum-total{background:var(--blue-l);border-radius:8px;padding:12px 16px;display:flex;gap:24px;flex-wrap:wrap;margin-bottom:12px}
.sum-total-item{text-align:center}
.sum-total-val{font-size:22px;font-weight:800;color:var(--blue)}
.sum-total-lbl{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.empty{text-align:center;padding:40px 0;color:var(--muted);font-size:14px}
@keyframes _sp{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(26,86,232,.2);border-top-color:var(--blue);border-radius:50%;animation:_sp .6s linear infinite}
@media(max-width:600px){.uname{display:none}}
</style>
</head>
<body>

<nav class="topbar">
  <div class="tb-in">
    <a class="logo" href="index.html"><div class="logo-m">D</div>Diskurs</a>
    <div class="nav" id="nav"></div>
    <div class="uchip">
      <div class="av" id="av">?</div>
      <span class="uname" id="uname"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>

<div class="page">
  <div class="ph">
    <div>
      <div class="ptitle">Хэд — детальные данные</div>
      <div class="psub" id="lastUpdate">Загрузка…</div>
    </div>
    <button class="btn btn-o" onclick="load()">Обновить</button>
  </div>

  <div class="tabs">
    <button class="tab on" id="tabMain" onclick="switchTab('main')">Все проекты</button>
    <button class="tab" id="tabSum" onclick="switchTab('sum')">Сводка за период</button>
  </div>

  <div id="tabContentMain">
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--red)"></div>Долг (нужно доделать)</div>
    <div class="li"><div class="ld" style="background:var(--green)"></div>Нет долга / перевыполнение</div>
    <div class="li"><div class="ld" style="background:var(--red);border-radius:2px"></div>Просроченный расч. день</div>
  </div>

  <div class="toolbar">
    <div class="search-wrap">
      <span class="si">🔍</span>
      <input type="text" id="srch" placeholder="Поиск по проекту…" oninput="render()">
    </div>
    <div style="display:flex;gap:8px;align-items:center">
      <select id="srt" onchange="render()">
        <option value="debt">По долгам ↓</option>
        <option value="name">По названию</option>
        <option value="pct">По прогрессу ↑</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="twrap" id="twrap">
      <div class="loading"><span class="sp"></span> Загрузка…</div>
    </div>
  </div>
  </div>

  <!-- СВОДКА ЗА ПЕРИОД -->
  <div id="tabContentSum" style="display:none">
    <div class="card" style="padding:20px;margin-bottom:14px">
      <div style="display:flex;align-items:flex-end;gap:12px;flex-wrap:wrap">
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px">С</div>
          <input type="date" id="sumFrom" style="width:auto;font-size:13px;padding:8px 12px">
        </div>
        <div>
          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:5px">По</div>
          <input type="date" id="sumTo" style="width:auto;font-size:13px;padding:8px 12px">
        </div>
        <button class="btn btn-p" onclick="loadSummary()" style="margin-bottom:1px">Показать</button>
      </div>
    </div>
    <div id="sumResult"></div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzc8iimMEq3qw0mDEL9PweBHdLKkIih6TZDGEii3yLTVeJKqCAqX8gTPZLEYR3mZ7TcMA/exec';

function api(action, params={}) {
  return new Promise((resolve) => {
    const cbName = '_cb' + Date.now() + Math.random().toString(36).slice(2);
    const qs = Object.entries({action, ...params}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    window[cbName] = function(result) {
      delete window[cbName];
      document.head.removeChild(script);
      resolve(result);
    };
    const script = document.createElement('script');
    script.src = API_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = function() {
      delete window[cbName];
      document.head.removeChild(script);
      resolve({ success: false, error: 'Не удалось подключиться к серверу' });
    };
    document.head.appendChild(script);
  });
}

const Auth = { get(){try{return JSON.parse(sessionStorage.getItem('dsk_user'));}catch{return null;}}, clear(){sessionStorage.removeItem('dsk_user');} };
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function isExpired(s){if(!s)return false;const[d,m,y]=String(s).split('.');const r=new Date(+y,+m-1,+d);const n=new Date(r);n.setMonth(n.getMonth()+1);return new Date()>=n;}

const user = Auth.get();
if (!user) { window.location.href='index.html'; }
else if (user.role === 'content') { window.location.href='projects.html'; }
else { init(); }

let allRows = [];

function init() {
  document.getElementById('av').textContent = user.name.charAt(0).toUpperCase();
  document.getElementById('uname').textContent = user.name;
  const nav = document.getElementById('nav');
  if (user.role === 'viewer') {
    nav.innerHTML = '<a href="status.html">Статус</a><a class="on" href="head.html">Хэд</a><a href="settings.html">Настройки</a><a href="help.html">Помощь</a>';
  } else {
    nav.innerHTML = '<a href="projects.html">Проекты</a><a href="status.html">Статус</a><a class="on" href="head.html">Хэд</a><a href="settings.html">Настройки</a><a href="help.html">Помощь</a>';
  }
  load();
}

async function load() {
  document.getElementById('twrap').innerHTML = '<div class="loading"><span class="sp"></span> Загрузка…</div>';
  const res = await api('getHead');
  if (!res.success) { document.getElementById('twrap').innerHTML=`<div class="empty">Ошибка: ${esc(res.error)}</div>`; return; }
  allRows = res.rows || [];
  const now = new Date();
  document.getElementById('lastUpdate').textContent = 'Обновлено в ' + now.getHours() + ':' + String(now.getMinutes()).padStart(2,'0');
  render();
}

function render() {
  const q = document.getElementById('srch').value.toLowerCase();
  const srt = document.getElementById('srt').value;
  let rows = allRows;
  if (q) rows = rows.filter(r => r.project.toLowerCase().includes(q));

  rows = [...rows].sort((a, b) => {
    if (srt === 'debt') return (b.debtS+b.debtR+b.debtSt) - (a.debtS+a.debtR+a.debtSt);
    if (srt === 'name') return a.project.localeCompare(b.project, 'ru');
    if (srt === 'pct') {
      const pA = a.planS+a.planR+a.planSt, pB = b.planS+b.planR+b.planSt;
      const dA = a.doneS+a.doneR+a.doneSt, dB = b.doneS+b.doneR+b.doneSt;
      return (pA>0?dA/pA:0) - (pB>0?dB/pB:0);
    }
    return 0;
  });

  if (!rows.length) { document.getElementById('twrap').innerHTML='<div class="empty">Нет данных</div>'; return; }

  const nc = (v) => v > 0 ? 'nred' : v < 0 ? 'ngrn' : 'ngry';

  const html = '<table>' +
    '<thead><tr>' +
    '<th class="tl" rowspan="2">Проект</th>' +
    '<th class="tl" rowspan="2">Расч. день</th>' +
    '<th class="gh" colspan="3">План</th>' +
    '<th class="dh" colspan="3">Долг → след. мес</th>' +
    '<th class="dnh" colspan="3">Выполнено</th>' +
    '</tr><tr>' +
    '<th class="gh">Стат.</th><th class="gh">Reels</th><th class="gh">Стор.</th>' +
    '<th class="dh">Стат.</th><th class="dh">Reels</th><th class="dh">Стор.</th>' +
    '<th class="dnh">Стат.</th><th class="dnh">Reels</th><th class="dnh">Стор.</th>' +
    '</tr></thead><tbody>' +
    rows.map(r => {
      const exp = isExpired(r.raschetDate);
      return `<tr>` +
        `<td class="tdl">${esc(r.project)}</td>` +
        `<td class="tdd"><span class="${exp?'bexp':'bok'}">${r.raschetDate}</span></td>` +
        `<td class="nr">${r.planS}</td><td class="nr">${r.planR}</td><td class="nr">${r.planSt}</td>` +
        `<td class="${nc(r.debtS)}">${r.debtS}</td><td class="${nc(r.debtR)}">${r.debtR}</td><td class="${nc(r.debtSt)}">${r.debtSt}</td>` +
        `<td class="nr">${r.doneS}</td><td class="nr">${r.doneR}</td><td class="nr">${r.doneSt}</td>` +
        `</tr>`;
    }).join('') +
    '</tbody></table>';

  document.getElementById('twrap').innerHTML = html;
}

function switchTab(t){
  document.getElementById('tabMain').classList.toggle('on',t==='main');
  document.getElementById('tabSum').classList.toggle('on',t==='sum');
  document.getElementById('tabContentMain').style.display=t==='main'?'block':'none';
  document.getElementById('tabContentSum').style.display=t==='sum'?'block':'none';
  if(t==='sum'&&!document.getElementById('sumFrom').value){
    // Ставим текущий месяц по умолчанию
    const now=new Date();
    const y=now.getFullYear(), m=String(now.getMonth()+1).padStart(2,'0');
    document.getElementById('sumFrom').value=`${y}-${m}-01`;
    document.getElementById('sumTo').value=`${y}-${m}-${new Date(y,now.getMonth()+1,0).getDate()}`;
  }
}

async function loadSummary(){
  const from=document.getElementById('sumFrom').value;
  const to=document.getElementById('sumTo').value;
  if(!from||!to){return;}
  const[fy,fm,fd]=from.split('-'); const[ty,tm,td]=to.split('-');
  const dateFrom=`${fd}.${fm}.${fy}`, dateTo=`${td}.${tm}.${ty}`;
  const el=document.getElementById('sumResult');
  el.innerHTML='<div class="loading"><span class="sp"></span> Загружаю…</div>';
  const res=await api('getSummary',{dateFrom,dateTo});
  if(!res.success){el.innerHTML=`<div class="empty">Ошибка: ${esc(res.error)}</div>`;return;}
  const rows=res.rows||[];
  if(!rows.length){el.innerHTML='<div class="empty">Нет данных за выбранный период</div>';return;}
  const totS=rows.reduce((a,r)=>a+r.staticFact,0);
  const totR=rows.reduce((a,r)=>a+r.reelsFact,0);
  const totSt=rows.reduce((a,r)=>a+r.storiesFact,0);
  el.innerHTML=
    `<div class="sum-total">
      <div class="sum-total-item"><div class="sum-total-val">${totS}</div><div class="sum-total-lbl">Статика</div></div>
      <div class="sum-total-item"><div class="sum-total-val">${totR}</div><div class="sum-total-lbl">Reels</div></div>
      <div class="sum-total-item"><div class="sum-total-val">${totSt}</div><div class="sum-total-lbl">Сторис</div></div>
      <div class="sum-total-item"><div class="sum-total-val">${totS+totR+totSt}</div><div class="sum-total-lbl">Итого</div></div>
    </div>` +
    `<div class="card"><div class="twrap">
    <table><thead><tr>
      <th class="tl">Проект</th>
      <th>Статика</th><th>Reels</th><th>Сторис</th><th>Итого</th>
    </tr></thead><tbody>` +
    rows.map(r=>{
      const tot=r.staticFact+r.reelsFact+r.storiesFact;
      return `<tr>
        <td class="tdl">${esc(r.project)}</td>
        <td class="nr">${r.staticFact}</td>
        <td class="nr">${r.reelsFact}</td>
        <td class="nr">${r.storiesFact}</td>
        <td class="nr" style="font-weight:700">${tot}</td>
      </tr>`;
    }).join('') +
    `<tr style="background:var(--blue-l);font-weight:700">
      <td class="tdl">Итого</td>
      <td>${totS}</td><td>${totR}</td><td>${totSt}</td><td>${totS+totR+totSt}</td>
    </tr>` +
    '</tbody></table></div></div>';
}

function logout() { Auth.clear(); window.location.href='index.html'; }
</script>
</body>
</html>
