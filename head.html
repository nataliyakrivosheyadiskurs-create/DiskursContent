<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Хэд</title>
<link rel="stylesheet" href="../styles.css">
<style>
  /* ===== HEAD TABLE ===== */
  .head-table-wrap { overflow-x: auto; }

  .head-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    white-space: nowrap;
  }

  .head-table th {
    text-align: center;
    font-size: 10px;
    font-weight: 700;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .05em;
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }

  .head-table th.col-name  { text-align: left; min-width: 160px; }
  .head-table th.col-date  { min-width: 90px; }
  .head-table th.col-group { background: var(--blue-light); color: var(--blue); }
  .head-table th.col-debt  { background: #FFF8EC; color: var(--yellow); }
  .head-table th.col-done  { background: var(--green-bg);   color: var(--green); }

  .head-table td {
    padding: 9px 10px;
    border-bottom: 1px solid var(--border);
    text-align: center;
    vertical-align: middle;
  }

  .head-table td.td-name { text-align: left; font-weight: 500; padding-left: 16px; }
  .head-table td.td-date { color: var(--muted); font-size: 11px; }

  .head-table tr:last-child td { border-bottom: none; }
  .head-table tbody tr:hover td { background: var(--blue-light); }

  .launch-tag {
    display: inline-block;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .05em;
    background: var(--yellow-bg);
    color: var(--yellow);
    border-radius: 3px;
    padding: 1px 5px;
    margin-bottom: 2px;
  }

  .num { font-weight: 600; }
  .num-red   { color: var(--red);    font-weight: 700; }
  .num-green { color: var(--green);  font-weight: 600; }
  .num-gray  { color: var(--muted); }

  /* ===== GROUP HEADER ===== */
  .group-header {
    background: var(--blue-light) !important;
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    text-align: left;
    padding: 6px 16px !important;
    letter-spacing: .03em;
  }

  /* ===== SEARCH ===== */
  .search-wrap { position: relative; flex: 1; max-width: 300px; }
  .search-wrap input { padding-left: 34px; }
  .search-icon {
    position: absolute; left: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 14px; pointer-events: none;
  }

  /* ===== TOOLBAR ===== */
  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  /* ===== LEGEND ===== */
  .legend {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 16px;
  }

  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-dot {
    width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<nav class="topbar">
  <div class="topbar-inner">
    <a class="logo" href="../../index.html">
      <div class="logo-mark">D</div>
      Diskurs
    </a>
    <div class="nav" id="nav-links"></div>
    <div class="user-chip">
      <div class="avatar" id="av">?</div>
      <span class="user-name" id="uname">Имя</span>
      <button class="btn-logout" onclick="doLogout()">Выйти</button>
    </div>
  </div>
</nav>

<div class="page">

  <div class="page-header">
    <div class="page-title">Хэд — детальные данные</div>
    <div class="page-sub">План, долги и прогресс по каждому типу контента</div>
  </div>

  <!-- Легенда -->
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>Долг (нужно доделать)</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--green)"></div>Нет долга / перевыполнение</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--yellow)"></div>На запуске</div>
  </div>

  <!-- Тулбар -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-inp" placeholder="Поиск по проекту…" oninput="renderTable()">
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <select id="sort-sel" onchange="renderTable()" style="width:auto;font-size:13px;padding:8px 12px;">
        <option value="debt">По долгам ↓</option>
        <option value="name">По названию</option>
        <option value="content">По прогрессу объёма</option>
      </select>
      <button class="btn btn-outline btn-sm" onclick="loadData()">Обновить</button>
    </div>
  </div>

  <!-- Таблица -->
  <div class="card">
    <div class="head-table-wrap" id="table-wrap">
      <div class="loading-box"><span class="spinner spinner-blue"></span> Загрузка…</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="../utils/config.js"></script>
<script src="../utils/api.js"></script>
<script>
const user = Auth.require();
let allRows = [];

if (user) init();

function init() {
  // Доступ только для head и viewer
  if (user.role === 'content') {
    window.location.href = 'projects.html';
    return;
  }

  document.getElementById('av').textContent    = user.name.charAt(0).toUpperCase();
  document.getElementById('uname').textContent = user.name;

  const nav = document.getElementById('nav-links');
  if (user.role === 'viewer') {
    nav.innerHTML = `
      <a class="nav-link" href="status.html">Статус</a>
      <a class="nav-link active" href="head.html">Хэд</a>
    `;
  } else {
    nav.innerHTML = `
      <a class="nav-link" href="projects.html">Проекты</a>
      <a class="nav-link" href="status.html">Статус</a>
      <a class="nav-link active" href="head.html">Хэд</a>
    `;
  }

  loadData();
}

async function loadData() {
  document.getElementById('table-wrap').innerHTML =
    '<div class="loading-box"><span class="spinner spinner-blue"></span> Загрузка…</div>';

  const res = await apiCall('getHead');
  if (!res.success) {
    document.getElementById('table-wrap').innerHTML =
      `<div class="empty-box">Ошибка: ${esc(res.error)}</div>`;
    return;
  }

  allRows = res.rows || [];
  renderTable();
}

function renderTable() {
  const q    = document.getElementById('search-inp').value.toLowerCase();
  const sort = document.getElementById('sort-sel').value;

  let rows = allRows;
  if (q) rows = rows.filter(r => r.project.toLowerCase().includes(q));

  // Сортировка
  rows = [...rows].sort((a, b) => {
    if (sort === 'debt') {
      const da = a.debtS + a.debtR + a.debtSt;
      const db = b.debtS + b.debtR + b.debtSt;
      return db - da;
    }
    if (sort === 'name') return a.project.localeCompare(b.project, 'ru');
    if (sort === 'content') {
      const planA = a.planS+a.planR+a.planSt+a.debtS+a.debtR+a.debtSt;
      const planB = b.planS+b.planR+b.planSt+b.debtS+b.debtR+b.debtSt;
      const doneA = a.doneS+a.doneR+a.doneSt;
      const doneB = b.doneS+b.doneR+b.doneSt;
      const pctA  = planA > 0 ? doneA/planA : 0;
      const pctB  = planB > 0 ? doneB/planB : 0;
      return pctA - pctB; // меньший прогресс наверх
    }
    return 0;
  });

  if (!rows.length) {
    document.getElementById('table-wrap').innerHTML = '<div class="empty-box">Нет данных</div>';
    return;
  }

  const html = `<table class="head-table">
    <thead>
      <tr>
        <th class="col-name" rowspan="2">Проект</th>
        <th class="col-date" rowspan="2">Расч. день</th>
        <th class="col-group" colspan="3">План</th>
        <th class="col-debt"  colspan="3">Долг → следующий месяц</th>
        <th class="col-done"  colspan="3">Сделано сегодня</th>
      </tr>
      <tr>
        <th class="col-group">Статика</th>
        <th class="col-group">Reels</th>
        <th class="col-group">Сторис</th>
        <th class="col-debt">Статика</th>
        <th class="col-debt">Reels</th>
        <th class="col-debt">Сторис</th>
        <th class="col-done">Статика</th>
        <th class="col-done">Reels</th>
        <th class="col-done">Сторис</th>
      </tr>
    </thead>
    <tbody>
      ${rows.map(r => {
        const expired = isExpired(r.raschetDate);
        const dCls = (v) => v > 0 ? 'num-red' : v < 0 ? 'num-green' : 'num-gray';

        return `<tr>
          <td class="td-name">
            ${r.isLaunch ? '<div class="launch-tag">на запуске</div>' : ''}
            ${esc(r.project)}
          </td>
          <td class="td-date" style="${expired ? 'color:var(--red);font-weight:700;' : ''}">
            ${r.raschetDate}
          </td>
          <td class="num">${r.planS}</td>
          <td class="num">${r.planR}</td>
          <td class="num">${r.planSt}</td>
          <td class="${dCls(r.debtS)}">${r.debtS}</td>
          <td class="${dCls(r.debtR)}">${r.debtR}</td>
          <td class="${dCls(r.debtSt)}">${r.debtSt}</td>
          <td class="num">${r.doneS}</td>
          <td class="num">${r.doneR}</td>
          <td class="num">${r.doneSt}</td>
        </tr>`;
      }).join('')}
    </tbody>
  </table>`;

  document.getElementById('table-wrap').innerHTML = html;
}

function doLogout() { Auth.clear(); window.location.href = '../../index.html'; }
</script>
</body>
</html>
