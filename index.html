<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Вход</title>
<link rel="stylesheet" href="src/styles.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--white); }

  .login-box { width: 100%; max-width: 380px; padding: 24px; }

  .login-logo {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
  }
  .login-logo-mark {
    width: 42px; height: 42px; background: var(--blue);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px; font-weight: 800;
  }
  .login-logo-name {
    font-size: 22px; font-weight: 800; letter-spacing: -0.04em; color: var(--text);
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
  .sub { font-size: 14px; color: var(--muted); margin-bottom: 28px; }

  .divider-line {
    height: 1px; background: var(--border); margin: 28px 0 20px;
  }
  .version { font-size: 11px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <div class="login-logo-mark">D</div>
    <div class="login-logo-name">Diskurs</div>
  </div>

  <h1>Вход в систему</h1>
  <p class="sub">Контент-портал агентства</p>

  <div class="field">
    <label>Логин</label>
    <input type="text" id="inp-login" placeholder="твой логин" autocomplete="username">
  </div>
  <div class="field">
    <label>Пароль</label>
    <input type="password" id="inp-pass" placeholder="••••••" autocomplete="current-password">
  </div>

  <button class="btn btn-primary btn-full" id="btn-login" onclick="doLogin()" style="margin-top:6px;">
    Войти
  </button>
  <div class="error-msg" id="err-login"></div>

  <div class="divider-line"></div>
  <div class="version">Diskurs Content App · 2026</div>
</div>

<div class="toast" id="toast"></div>

<script src="src/utils/config.js"></script>
<script src="src/utils/api.js"></script>
<script>
  // Если уже залогинен — редирект
  (function() {
    const u = Auth.get();
    if (u) redirectByRole(u.role);
  })();

  async function doLogin() {
    const login = document.getElementById('inp-login').value.trim();
    const pass  = document.getElementById('inp-pass').value.trim();
    const btn   = document.getElementById('btn-login');
    const err   = document.getElementById('err-login');

    if (!login || !pass) { showErr('Заполни оба поля'); return; }
    err.classList.remove('visible');
    setBtnLoading(btn, 'Вхожу…');

    const res = await apiCall('login', { login, password: pass });

    resetBtn(btn, 'Войти');
    if (!res.success) { showErr(res.error || 'Ошибка'); return; }

    Auth.save(res);
    redirectByRole(res.role);
  }

  function redirectByRole(role) {
    if (role === 'viewer') {
      window.location.href = 'src/pages/status.html';
    } else {
      window.location.href = 'src/pages/projects.html';
    }
  }

  function showErr(msg) {
    const el = document.getElementById('err-login');
    el.textContent = msg;
    el.classList.add('visible');
  }

  document.getElementById('inp-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
