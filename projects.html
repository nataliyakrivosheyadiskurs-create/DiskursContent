<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Проекты</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#1A56E8;--blue-d:#1340BE;--blue-l:#EEF3FD;--blue-m:#C4D4FA;--bg:#F5F7FB;--white:#fff;--border:#E2E8F0;--text:#0F172A;--muted:#64748B;--green:#16A34A;--gbg:#DCFCE7;--yellow:#CA8A04;--ybg:#FEF9C3;--red:#DC2626;--rbg:#FEE2E2;--r:10px;--sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05)}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}

/* topbar */
.topbar{position:sticky;top:0;z-index:50;background:var(--white);border-bottom:1px solid var(--border);box-shadow:var(--sh)}
.tb-in{max-width:640px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;font-size:15px;font-weight:800;color:var(--text);letter-spacing:-0.03em}
.logo-m{width:30px;height:30px;background:var(--blue);border-radius:7px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800}
.nav{display:flex;gap:2px}
.nav a{padding:6px 12px;border-radius:7px;font-size:13px;font-weight:500;color:var(--muted);text-decoration:none;transition:all .12s}
.nav a:hover{color:var(--text);background:var(--bg)}
.nav a.on{color:var(--blue);background:var(--blue-l);font-weight:600}
.uchip{display:flex;align-items:center;gap:7px}
.av{width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center}
.uname{font-size:13px;font-weight:600}
.logout-btn{background:none;border:none;font-family:inherit;font-size:12px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px}
.logout-btn:hover{color:var(--red)}

/* page */
.page{max-width:640px;margin:0 auto;padding:28px 20px 60px}
.ph{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.ptitle{font-size:20px;font-weight:700;letter-spacing:-0.02em}
.psub{font-size:13px;color:var(--muted);margin-top:3px}

/* card */
.card{background:var(--white);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:12px}
.cbody{padding:20px}
.ch{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border)}
.ch h2{font-size:14px;font-weight:700}

/* project list */
.pitem{display:flex;align-items:center;justify-content:space-between;padding:13px 20px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;gap:8px}
.pitem:last-child{border-bottom:none}
.pitem:hover{background:var(--blue-l)}
.pitem:hover .parrow{color:var(--blue)}
.pname{font-size:14px;font-weight:500;flex:1}
.parrow{color:var(--border);font-size:18px;transition:color .1s}
.archive-btn{background:none;border:none;cursor:pointer;font-size:15px;padding:4px 6px;border-radius:6px;opacity:0.45;transition:all .15s}
.archive-btn:hover{opacity:1;background:#FEF3C7}

/* back */
.back{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--muted);cursor:pointer;background:none;border:none;font-family:inherit;padding:0;margin-bottom:18px;transition:color .12s}
.back:hover{color:var(--blue)}

/* proj header */
.proj-hd{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.proj-title{font-size:17px;font-weight:700;letter-spacing:-0.01em;flex:1}
.dpill{background:var(--blue-l);color:var(--blue);font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.psub2{font-size:12px;color:var(--muted);margin-top:4px}

/* progress */
.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:6px}
.pcell{background:var(--bg);border-radius:8px;padding:12px 8px;text-align:center}
.ptype{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.ptrack{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:7px}
.pfill{height:100%;border-radius:99px;background:var(--blue);transition:width .35s}
.pfill.warn{background:var(--yellow)}
.pfill.good{background:var(--green)}
.pfill.crit{background:var(--red)}
.pnums{font-size:15px;font-weight:700}
.pnums span{font-size:11px;font-weight:400;color:var(--muted)}
.trow{display:flex;align-items:center;gap:10px;padding-top:12px;border-top:1px solid var(--border);margin-top:4px}
.tlbl{font-size:12px;color:var(--muted);white-space:nowrap}
.ttrack{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.tfill{height:100%;background:var(--muted);border-radius:99px}
.tpct{font-size:12px;font-weight:600;color:var(--muted);white-space:nowrap}

/* date picker row */
.date-row{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.date-row input[type=date]{flex:1;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:9px 12px;outline:none;transition:border-color .15s}
.date-row input[type=date]:focus{border-color:var(--blue)}
.date-label{font-size:12px;color:var(--muted);white-space:nowrap}
.today-btn{background:var(--blue-l);color:var(--blue);border:none;border-radius:7px;font-family:inherit;font-size:12px;font-weight:600;padding:6px 11px;cursor:pointer;white-space:nowrap}
.today-btn:hover{background:var(--blue-m)}

/* mode buttons */
.mrow{display:flex;gap:6px;margin-bottom:13px}
.mbtn{flex:1;padding:7px 8px;border-radius:7px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:all .12s}
.mbtn.on{background:var(--blue-l);border-color:var(--blue);color:var(--blue);font-weight:600}

/* counters */
.crow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px}
.cbox{border:1.5px solid var(--border);border-radius:9px;padding:12px 8px;text-align:center}
.ctype{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.cctrl{display:flex;align-items:center;justify-content:center;gap:6px}
.cbtn{width:30px;height:30px;border-radius:7px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:18px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .1s;font-family:inherit;line-height:1;flex-shrink:0}
.cbtn:hover{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.cbtn:active{transform:scale(.9)}
.cval{font-size:22px;font-weight:700;min-width:28px}

/* form */
.field{margin-bottom:13px}
label{display:block;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
input,select{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:14px;padding:10px 12px;outline:none;transition:border-color .15s,box-shadow .15s}
input:focus,select:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,86,232,.09)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.err2{background:var(--rbg);border:1px solid #FECACA;border-radius:7px;color:var(--red);font-size:13px;padding:8px 12px;margin-top:8px;display:none}
.err2.on{display:block}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;border:none;border-radius:8px;font-family:inherit;font-size:14px;font-weight:600;padding:11px 18px;cursor:pointer;transition:background .15s;white-space:nowrap}
.btn:disabled{opacity:.44;cursor:not-allowed}
.btn-p{background:var(--blue);color:#fff;box-shadow:0 2px 7px rgba(26,86,232,.22)}
.btn-p:hover:not(:disabled){background:var(--blue-d)}
.btn-o{background:var(--white);color:var(--blue);border:1.5px solid var(--blue-m)}
.btn-o:hover{background:var(--blue-l)}
.btn-g{background:transparent;color:var(--muted);border:1.5px solid var(--border)}
.btn-g:hover{color:var(--text)}
.btn-sm{font-size:12px;padding:7px 13px}
.btn-full{width:100%}

/* section label */
.slbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:11px}

/* existing values hint */
.exist-hint{background:var(--bg);border-radius:7px;padding:9px 12px;margin-bottom:12px;font-size:12px;color:var(--muted);display:none}
.exist-hint.on{display:block}
.exist-hint strong{color:var(--text)}

/* loading */
.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px 0;color:var(--muted);font-size:14px}
.empty{text-align:center;padding:36px 0;color:var(--muted);font-size:14px}

@keyframes _sp{to{transform:rotate(360deg)}}
.sp{display:inline-block;width:13px;height:13px;border:2px solid rgba(26,86,232,.2);border-top-color:var(--blue);border-radius:50%;animation:_sp .6s linear infinite}
.sp-w{border-color:rgba(255,255,255,.35);border-top-color:#fff}
@media(max-width:480px){.g2{grid-template-columns:1fr}.pgrid,.crow{grid-template-columns:1fr}.uname{display:none}}
</style>
</head>
<body>

<nav class="topbar">
  <div class="tb-in">
    <a class="logo" href="index.html"><div class="logo-m">D</div>Diskurs</a>
    <div class="nav" id="nav"></div>
    <div class="uchip">
      <div class="av" id="av">?</div>
      <span class="uname" id="uname"></span>
      <button class="logout-btn" onclick="logout()">Выйти</button>
    </div>
  </div>
</nav>

<!-- LIST VIEW -->
<div class="page" id="vList">
  <div class="ph">
    <div>
      <div class="ptitle">Мои проекты</div>
      <div class="psub" id="todaySub"></div>
    </div>
    <button class="btn btn-o btn-sm" onclick="toggleForm()">+ Новый проект</button>
  </div>

  <div class="card" id="listCard">
    <div class="loading"><span class="sp"></span> Загрузка…</div>
  </div>

  <div style="margin-top:8px">
    <button class="btn btn-g btn-sm" onclick="toggleArchive()" id="archiveToggle" style="width:100%;color:var(--muted);font-size:12px">
      📦 Архив проектов
    </button>
  </div>
  <div id="archiveSection" style="display:none;margin-top:6px">
    <div class="card" id="archiveCard">
      <div class="loading"><span class="sp"></span> Загрузка…</div>
    </div>
  </div>

  <div class="card" id="formCard" style="display:none">
    <div class="ch">
      <h2>Новый проект</h2>
      <button class="btn btn-g btn-sm" onclick="toggleForm()">Отмена</button>
    </div>
    <div class="cbody">
      <div class="field"><label>Название проекта</label><input type="text" id="npName" placeholder="Клиент — тип работы"></div>
      <div class="field" id="npEmpField" style="display:none"><label>Ответственный сотрудник</label><select id="npEmp"></select></div>
      <div class="g2">
        <div class="field"><label>Статика / мес</label><input type="number" id="npS" min="0" value="0"></div>
        <div class="field"><label>Reels / мес</label><input type="number" id="npR" min="0" value="0"></div>
      </div>
      <div class="g2">
        <div class="field"><label>Сторис / мес</label><input type="number" id="npSt" min="0" value="0"></div>
        <div class="field"><label>Расчётный день</label><input type="date" id="npDate"></div>
      </div>
      <div class="err2" id="npErr"></div>
      <button class="btn btn-p btn-full" id="npBtn" onclick="createProj()" style="margin-top:6px">Создать проект</button>
    </div>
  </div>
</div>

<!-- INPUT VIEW -->
<div class="page" id="vInput" style="display:none">
  <button class="back" onclick="backToList()">← Назад</button>

  <div class="card cbody" style="margin-bottom:11px">
    <div class="proj-hd">
      <div class="proj-title" id="projTitle"></div>
      <div class="dpill" id="dpill"></div>
    </div>
    <div class="psub2" id="projPeriod">Загрузка…</div>
  </div>

  <div class="card cbody" style="margin-bottom:11px">
    <div class="slbl">Прогресс за месяц</div>
    <div class="pgrid" id="pgrid"><div class="pcell"><div class="loading" style="padding:10px 0"><span class="sp"></span></div></div><div class="pcell"></div><div class="pcell"></div></div>
    <div class="trow">
      <span class="tlbl" id="tlbl">0 из 0 дн.</span>
      <div class="ttrack"><div class="tfill" id="tfill" style="width:0%"></div></div>
      <span class="tpct" id="tpct">0%</span>
    </div>
  </div>

  <div id="debtBlock" style="display:none;margin-bottom:10px;background:#FFF7ED;border:1px solid #FED7AA;border-radius:12px;padding:12px 16px">
    <div style="font-size:11px;font-weight:700;color:#92400E;letter-spacing:.5px;margin-bottom:8px">ТЕКУЩИЙ ДОЛГ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px" id="debtGrid"></div>
  </div>

  <div class="card cbody">
    <div class="slbl">Дата публикации</div>
    <div class="date-row">
      <input type="date" id="inputDate" onchange="onDateChange()">
      <button class="today-btn" onclick="setToday()">Сегодня</button>
    </div>
    <div class="exist-hint" id="existHint"></div>

    <div class="slbl">Опубликовано</div>
    <div class="mrow">
      <button class="mbtn on" id="mAdd" onclick="setMode('add')">+ Добавить</button>
      <button class="mbtn" id="mSet" onclick="setMode('set')">Заменить</button>
    </div>
    <div class="crow">
      <div class="cbox"><div class="ctype">Статика</div><div class="cctrl"><button class="cbtn" onclick="chg('s',-1)">−</button><div class="cval" id="vs">0</div><button class="cbtn" onclick="chg('s',1)">+</button></div></div>
      <div class="cbox"><div class="ctype">Reels</div><div class="cctrl"><button class="cbtn" onclick="chg('r',-1)">−</button><div class="cval" id="vr">0</div><button class="cbtn" onclick="chg('r',1)">+</button></div></div>
      <div class="cbox"><div class="ctype">Сторис</div><div class="cctrl"><button class="cbtn" onclick="chg('st',-1)">−</button><div class="cval" id="vst">0</div><button class="cbtn" onclick="chg('st',1)">+</button></div></div>
    </div>
    <button class="btn btn-p btn-full" id="saveBtn" onclick="doSave()" disabled>Сохранить</button>
  </div>

  <div style="margin-top:10px">
    <button class="btn btn-g btn-sm" onclick="toggleProjSettings()" style="width:100%;color:var(--muted);font-size:12px">
      ⚙ Настройки проекта
    </button>
  </div>
  <div id="projSettingsPanel" style="display:none;margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:14px">
    <div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--muted)">ПЛАН НА МЕСЯЦ</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">СТАТИКА</div>
        <input id="setPlanS" type="number" min="0" style="width:100%;border:1px solid var(--border);border-radius:7px;padding:8px;font-size:14px;text-align:center">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">REELS</div>
        <input id="setPlanR" type="number" min="0" style="width:100%;border:1px solid var(--border);border-radius:7px;padding:8px;font-size:14px;text-align:center">
      </div>
      <div>
        <div style="font-size:11px;color:var(--muted);margin-bottom:4px">СТОРИС</div>
        <input id="setPlanSt" type="number" min="0" style="width:100%;border:1px solid var(--border);border-radius:7px;padding:8px;font-size:14px;text-align:center">
      </div>
    </div>
    <button class="btn btn-p btn-sm" onclick="saveProjSettings()" style="width:100%;font-size:13px">Сохранить план</button>
    <div id="settingsMsg" style="font-size:12px;margin-top:8px;text-align:center;display:none"></div>
  </div>
  <div style="margin-top:8px;text-align:center">
    <button class="btn btn-g btn-sm" onclick="showNewMonth()" style="width:100%;color:var(--muted);font-size:12px">
      + Новый месяц
    </button>
  </div>
  <div style="margin-top:6px;text-align:center">
    <button class="btn btn-sm" onclick="confirmArchive()" style="width:100%;font-size:12px;color:var(--red);border:1.5px solid #FECACA;background:transparent">
      Архивировать проект
    </button>
  </div>
</div>

<!-- НОВЫЙ МЕСЯЦ MODAL -->
<div id="nmOverlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:200;align-items:center;justify-content:center;padding:20px">
  <div style="background:var(--white);border-radius:14px;padding:24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <div style="font-size:16px;font-weight:700;margin-bottom:4px">Новый месяц</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:18px" id="nmProjName"></div>
    <div class="field">
      <label>Расчётный день нового месяца</label>
      <input type="date" id="nmDate">
    </div>
    <div id="nmDebt" style="display:none;background:#FFF7ED;border:1px solid #FED7AA;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#92400E"></div>
    <div class="g2" style="margin-bottom:14px">
      <div class="field"><label>Статика / мес</label><input type="number" id="nmS" min="0" value="0"></div>
      <div class="field"><label>Reels / мес</label><input type="number" id="nmR" min="0" value="0"></div>
    </div>
    <div class="field" style="margin-bottom:18px">
      <label>Сторис / мес</label><input type="number" id="nmSt" min="0" value="0">
    </div>
    <div class="err2" id="nmErr"></div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="btn btn-g" style="flex:1" onclick="hideNewMonth()">Отмена</button>
      <button class="btn btn-p" style="flex:2" id="nmBtn" onclick="doNewMonth()">Создать месяц</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzc8iimMEq3qw0mDEL9PweBHdLKkIih6TZDGEii3yLTVeJKqCAqX8gTPZLEYR3mZ7TcMA/exec';

async function api(action, params={}) {
  return new Promise((resolve) => {
    const cbName = '_cb' + Date.now() + Math.random().toString(36).slice(2);
    const qs = Object.entries({action, ...params}).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
    window[cbName] = function(result) {
      delete window[cbName];
      document.head.removeChild(script);
      resolve(result);
    };
    const script = document.createElement('script');
    script.src = API_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = function() {
      delete window[cbName];
      document.head.removeChild(script);
      resolve({ success: false, error: 'Не удалось подключиться к серверу' });
    };
    document.head.appendChild(script);
  });
}

const Auth = {
  get(){ try{return JSON.parse(sessionStorage.getItem('dsk_user'));}catch{return null;} },
  clear(){ sessionStorage.removeItem('dsk_user'); }
};

function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function fmtDate(str){
  if(!str) return '';
  const[d,m,y]=String(str).split('.');
  if(!y) return str;
  const dt=new Date(+y,+m-1,+d);
  return ['вс','пн','вт','ср','чт','пт','сб'][dt.getDay()]+', '+dt.getDate()+' '+['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'][dt.getMonth()];
}

function todayStr(){const t=new Date();return String(t.getDate()).padStart(2,'0')+'.'+String(t.getMonth()+1).padStart(2,'0')+'.'+t.getFullYear();}
function todayISO(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function isoToDmy(iso){if(!iso)return '';const[y,m,d]=iso.split('-');return d+'.'+m+'.'+y;}
function dmyToIso(dmy){if(!dmy)return '';const[d,m,y]=dmy.split('.');return y+'-'+m+'-'+d;}

function showToast(msg,type){
  let el=document.getElementById('_t');
  if(!el){el=document.createElement('div');el.id='_t';Object.assign(el.style,{position:'fixed',bottom:'24px',left:'50%',transform:'translateX(-50%) translateY(20px)',padding:'10px 22px',borderRadius:'100px',fontSize:'13px',fontWeight:'600',color:'#fff',opacity:'0',transition:'all .2s',pointerEvents:'none',zIndex:'9999',whiteSpace:'nowrap',boxShadow:'0 4px 16px rgba(0,0,0,.15)',fontFamily:'inherit'});document.body.appendChild(el);}
  el.textContent=msg;
  el.style.background=type==='ok'?'#16A34A':type==='err'?'#DC2626':'#0F172A';
  el.style.opacity='1';el.style.transform='translateX(-50%) translateY(0)';
  clearTimeout(el._t);
  el._t=setTimeout(()=>{el.style.opacity='0';el.style.transform='translateX(-50%) translateY(20px)';},2600);
}

// ── INIT ──
const user = Auth.get();
if (!user) { window.location.href='index.html'; }
else { initPage(); }

function initPage() {
  document.getElementById('av').textContent    = user.name.charAt(0).toUpperCase();
  document.getElementById('uname').textContent = user.name;

  const nav = document.getElementById('nav');
  if (user.role === 'head') {
    nav.innerHTML = '<a class="on" href="projects.html">Проекты</a><a href="status.html">Статус</a><a href="head.html">Хэд</a><a href="settings.html">Настройки</a><a href="help.html">Помощь</a>';
  } else {
    nav.innerHTML = '<a class="on" href="projects.html">Проекты</a><a href="status.html">Статус</a><a href="settings.html">Настройки</a><a href="help.html">Помощь</a>';
  }

  const ts = todayStr();
  document.getElementById('todaySub').textContent = fmtDate(ts);

  const d = new Date();
  document.getElementById('npDate').value = todayISO();

  loadProjects();
}

async function loadProjects() {
  const card = document.getElementById('listCard');
  card.innerHTML = '<div class="loading"><span class="sp"></span> Загрузка…</div>';
  const res = await api('getProjects', { projectsFilter: user.projectsFilter, login: user.login });
  if (!res.success) { card.innerHTML=`<div class="empty">Ошибка: ${esc(res.error)}</div>`; return; }
  if (!res.projects.length) { card.innerHTML='<div class="empty">Нет проектов</div>'; return; }
  const isHead = user.role === 'head' || user.role === 'viewer';
  card.innerHTML = res.projects.map(p=>
    `<div class="pitem">` +
    `<span class="pname" onclick="openProj('${esc(p)}')" style="flex:1;cursor:pointer">${esc(p)}</span>` +
    (isHead ? `<button class="archive-btn" title="Архивировать" onclick="quickArchive('${esc(p)}',event)">📦</button>` : ``) +
    `<span class="parrow" onclick="openProj('${esc(p)}')" style="cursor:pointer">›</span></div>`
  ).join('');
}

// ── NEW PROJECT ──
function toggleForm() {
  const c = document.getElementById('formCard');
  const opening = c.style.display === 'none';
  c.style.display = opening ? 'block' : 'none';
  if (opening && (user.role === 'head' || user.role === 'viewer')) _loadEmpSelector();
}

async function _loadEmpSelector() {
  const field = document.getElementById('npEmpField');
  const sel   = document.getElementById('npEmp');
  if (!field || !sel) return;
  try {
    const res = await api('getEmployees');
    if (!res.success || !res.employees.length) return;
    sel.innerHTML = res.employees
      .filter(e => e.role === 'content' || e.role === 'head')
      .map(e => `<option value="${esc(e.login)}" data-name="${esc(e.name)}" ${e.login===user.login?'selected':''}>${esc(e.name)}</option>`)
      .join('');
    field.style.display = '';
  } catch(e) {}
}

async function createProj() {
  const name = document.getElementById('npName').value.trim();
  const pS   = document.getElementById('npS').value;
  const pR   = document.getElementById('npR').value;
  const pSt  = document.getElementById('npSt').value;
  const dv   = document.getElementById('npDate').value;
  const err  = document.getElementById('npErr');
  const btn  = document.getElementById('npBtn');

  if (!name) { showFErr(err,'Введи название'); return; }
  if (!dv)   { showFErr(err,'Выбери дату'); return; }
  err.classList.remove('on');

  const [y,m,d] = dv.split('-');
  btn.disabled=true; btn.innerHTML='<span style="display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:_sp .6s linear infinite"></span> Создаю…';

  const empSel = document.getElementById('npEmp');
  const empLogin = empSel && empSel.value ? empSel.value : user.login;
  const empName  = empSel && empSel.selectedOptions[0] ? empSel.selectedOptions[0].dataset.name : user.name;

  const res = await api('createProject',{name,responsibleName:empName,planStatic:+pS||0,planReels:+pR||0,planStories:+pSt||0,raschetDay:`${d}.${m}.${y}`});

  btn.disabled=false; btn.textContent='Создать проект';
  if (!res.success) { showFErr(err,res.error); return; }

  // Добавляем проект в фильтр ответственного
  await _addProjectToEmployee(empLogin, name);

  toggleForm();
  document.getElementById('npName').value='';
  showToast('Проект создан ✓','ok');
  loadProjects();
}

async function _addProjectToEmployee(login, projectName) {
  try {
    const empRes = await api('getEmployees');
    if (!empRes.success) return;
    const emp = empRes.employees.find(e => e.login === login);
    if (!emp) return;
    const cur = emp.projectsFilter || '';
    const isAll = !cur || cur.toLowerCase() === 'все';
    if (isAll) return; // у него уже все проекты — ничего не меняем
    const list = cur.split(',').map(s => s.trim()).filter(Boolean);
    if (!list.includes(projectName)) {
      list.push(projectName);
      await api('saveProjectsFilter', { login, projectsFilter: list.join(', ') });
      // Если это текущий пользователь — обновляем sessionStorage
      if (login === user.login) {
        user.projectsFilter = list.join(', ');
        sessionStorage.setItem('dsk_user', JSON.stringify(user));
      }
    }
  } catch(e) {}
}

// ── OPEN PROJECT ──
const S = { proj:null, data:null, mode:'add', v:{s:0,r:0,st:0}, date:null };

async function openProj(name) {
  S.proj=name; S.v={s:0,r:0,st:0}; S.mode='add'; S.date=todayStr();
  resetCnt(); setMode('add');

  document.getElementById('vList').style.display='none';
  document.getElementById('vInput').style.display='block';
  document.getElementById('projTitle').textContent=name;
  document.getElementById('dpill').textContent=fmtDate(S.date);
  document.getElementById('projPeriod').textContent='Загрузка…';
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('existHint').classList.remove('on');

  // Set date input to today
  document.getElementById('inputDate').value = todayISO();

  const res = await api('getProject',{projectName:name, date:S.date});
  S.data=res;
  if (!res.success){document.getElementById('projPeriod').textContent=res.error;return;}
  renderProg(res);
  showExistingValues(res);
  document.getElementById('saveBtn').disabled=false;
}

function backToList(){
  document.getElementById('vInput').style.display='none';
  document.getElementById('vList').style.display='block';
}

function setToday(){
  document.getElementById('inputDate').value = todayISO();
  onDateChange();
}

async function onDateChange(){
  const iso = document.getElementById('inputDate').value;
  if(!iso) return;
  S.date = isoToDmy(iso);
  document.getElementById('dpill').textContent = fmtDate(S.date);
  resetCnt();
  document.getElementById('saveBtn').disabled=true;
  document.getElementById('existHint').classList.remove('on');

  const res = await api('getProject',{projectName:S.proj, date:S.date});
  S.data=res;
  if (!res.success){ showToast('Ошибка: '+res.error,'err'); return; }
  renderProg(res);
  showExistingValues(res);
  document.getElementById('saveBtn').disabled=false;
}

function showExistingValues(res){
  const hint = document.getElementById('existHint');
  const dv = res.dayValues;
  if(dv && (dv.staticFact>0 || dv.reelsFact>0 || dv.storiesFact>0)){
    hint.innerHTML = `Уже записано: <strong>Статика ${dv.staticFact}</strong> · <strong>Reels ${dv.reelsFact}</strong> · <strong>Сторис ${dv.storiesFact}</strong>`;
    hint.classList.add('on');
  } else {
    hint.classList.remove('on');
  }
}

function renderProg(d){
  document.getElementById('projPeriod').textContent='Расчётный период с '+d.raschetDate;
  const types=['Статика','Reels','Сторис'];
  document.getElementById('pgrid').innerHTML=types.map((t,i)=>{
    const p=d.planWithDebt[i]||0, v=d.done[i]||0;
    const pct=p>0?Math.round(v/p*100):(v>0?100:0);
    const cls=pct>=100?'good':pct>=80?'warn':'';
    return `<div class="pcell"><div class="ptype">${t}</div><div class="ptrack"><div class="pfill ${cls}" style="width:${Math.min(pct,100)}%"></div></div><div class="pnums">${v}<span> / ${p}</span></div></div>`;
  }).join('');
  const tp=d.daysTotal>0?Math.round(d.daysPassed/d.daysTotal*100):0;
  document.getElementById('tlbl').textContent=`${d.daysPassed} из ${d.daysTotal} дн.`;
  document.getElementById('tfill').style.width=tp+'%';
  document.getElementById('tpct').textContent=tp+'%';

  // Блок долга
  const planS  = d.planS  || 0;
  const planR  = d.planR  || 0;
  const planSt = d.planSt || 0;
  const doneS  = (d.done && d.done[0]) || 0;
  const doneR  = (d.done && d.done[1]) || 0;
  const doneSt = (d.done && d.done[2]) || 0;
  const debtS  = Math.max(0, planS  - doneS);
  const debtR  = Math.max(0, planR  - doneR);
  const debtSt = Math.max(0, planSt - doneSt);
  const debtBlock = document.getElementById('debtBlock');
  if (debtS > 0 || debtR > 0 || debtSt > 0) {
    const items = [
      { label: 'СТАТИКА', val: debtS,  plan: planS },
      { label: 'REELS',   val: debtR,  plan: planR },
      { label: 'СТОРИС',  val: debtSt, plan: planSt },
    ];
    document.getElementById('debtGrid').innerHTML = items.map(it =>
      `<div style="text-align:center">
        <div style="font-size:10px;color:#92400E;margin-bottom:2px">${it.label}</div>
        <div style="font-size:20px;font-weight:700;color:#C2410C;line-height:1">${it.val}</div>
        <div style="font-size:11px;color:#B45309">из ${it.plan}</div>
      </div>`
    ).join('');
    debtBlock.style.display = '';
  } else {
    debtBlock.style.display = 'none';
  }
}

function chg(t,delta){S.v[t]=Math.max(0,(S.v[t]||0)+delta);document.getElementById('v'+t).textContent=S.v[t];}
function resetCnt(){S.v={s:0,r:0,st:0};['s','r','st'].forEach(t=>document.getElementById('v'+t).textContent=0);}
function setMode(m){S.mode=m;document.getElementById('mAdd').classList.toggle('on',m==='add');document.getElementById('mSet').classList.toggle('on',m==='set');}

async function doSave(){
  if (S.v.s+S.v.r+S.v.st===0&&S.mode==='add'){showToast('Нечего сохранять','err');return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true;btn.innerHTML='<span style="display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:_sp .6s linear infinite"></span> Сохраняю…';
  const res=await api('saveData',{projectName:S.proj,date:S.date,staticVal:S.v.s,reelsVal:S.v.r,storiesVal:S.v.st,mode:S.mode});
  btn.disabled=false;btn.textContent='Сохранить';
  if (!res.success){showToast('Ошибка: '+res.error,'err');return;}
  S.data=res;renderProg(res);resetCnt();
  document.getElementById('existHint').classList.remove('on');
  showToast('Сохранено ✓','ok');
  // Reload to show updated existing values
  const fresh=await api('getProject',{projectName:S.proj,date:S.date});
  if(fresh.success){ renderProg(fresh); showExistingValues(fresh); }
}

function showFErr(el,msg){el.textContent=msg;el.classList.add('on');}
function logout(){Auth.clear();window.location.href='index.html';}

// ── АРХИВ ──
let archiveLoaded = false;

async function toggleArchive() {
  const sec = document.getElementById('archiveSection');
  const btn = document.getElementById('archiveToggle');
  const visible = sec.style.display !== 'none';
  sec.style.display = visible ? 'none' : 'block';
  btn.textContent = visible ? '📦 Архив проектов' : '📦 Скрыть архив';
  if (!visible && !archiveLoaded) loadArchive();
}

async function loadArchive() {
  const card = document.getElementById('archiveCard');
  card.innerHTML = '<div class="loading"><span class="sp"></span> Загрузка…</div>';
  const res = await api('getArchivedProjects', { projectsFilter: user.projectsFilter });
  archiveLoaded = true;
  if (!res.success) { card.innerHTML=`<div class="empty">Ошибка: ${esc(res.error)}</div>`; return; }
  if (!res.projects.length) { card.innerHTML='<div class="empty" style="padding:16px">Архив пуст</div>'; return; }
  card.innerHTML = res.projects.map(p =>
    `<div class="pitem" style="opacity:.65">` +
    `<span class="pname" style="color:var(--muted)">${esc(p)}</span>` +
    (user.role==='head'||user.role==='viewer'
      ? `<button class="btn btn-g btn-sm" style="font-size:11px;padding:4px 10px" onclick="doUnarchive('${esc(p)}')">Восстановить</button>`
      : `<span style="font-size:11px;color:var(--muted)">архив</span>`) +
    `</div>`
  ).join('');
}

async function doUnarchive(name) {
  const res = await api('unarchiveProject', { projectName: name });
  if (!res.success) { showToast('Ошибка: '+res.error, 'err'); return; }
  showToast(name + ' восстановлен ✓', 'ok');
  archiveLoaded = false;
  loadProjects();
  loadArchive();
}

function toggleProjSettings() {
  const panel = document.getElementById('projSettingsPanel');
  const open = panel.style.display === 'none';
  panel.style.display = open ? 'block' : 'none';
  if (open && S.data) {
    document.getElementById('setPlanS').value  = S.data.planS  || 0;
    document.getElementById('setPlanR').value  = S.data.planR  || 0;
    document.getElementById('setPlanSt').value = S.data.planSt || 0;
  }
}

async function saveProjSettings() {
  const planS  = +document.getElementById('setPlanS').value  || 0;
  const planR  = +document.getElementById('setPlanR').value  || 0;
  const planSt = +document.getElementById('setPlanSt').value || 0;
  const msg = document.getElementById('settingsMsg');
  msg.style.display = 'none';
  const res = await api('updateProjectPlan', { projectName: S.proj, date: S.date, planS, planR, planSt });
  if (res.success) {
    msg.textContent = '✓ План сохранён'; msg.style.color = 'var(--green)'; msg.style.display = '';
    // Обновляем данные и прогресс
    const fresh = await api('getProject', { projectName: S.proj, date: S.date });
    if (fresh.success) { S.data = fresh; renderProg(fresh); }
    setTimeout(() => { msg.style.display = 'none'; }, 2500);
  } else {
    msg.textContent = '✗ ' + (res.error || 'Ошибка'); msg.style.color = 'var(--red)'; msg.style.display = '';
  }
}

async function quickArchive(name, evt) {
  if (evt) evt.stopPropagation();
  if (!confirm('Архивировать проект «' + name + '»?\n\nОн пропадёт из списка активных проектов.')) return;
  const res = await api('archiveProject', { projectName: name });
  if (res.success) { loadProjects(); archiveLoaded = false; }
  else alert('Ошибка: ' + (res.error || 'неизвестная'));
}

function confirmArchive() {
  if (!confirm('Архивировать проект «' + S.proj + '»?\n\nОн пропадёт из списка активных проектов. Восстановить сможет Лера или Ника.')) return;
  doArchive();
}

async function doArchive() {
  const res = await api('archiveProject', { projectName: S.proj });
  if (!res.success) { showToast('Ошибка: '+res.error, 'err'); return; }
  showToast('Проект архивирован', 'ok');
  archiveLoaded = false;
  backToList();
  loadProjects();
}

function showNewMonth(){
  document.getElementById('nmProjName').textContent=S.proj;
  document.getElementById('nmDate').value=todayISO();
  document.getElementById('nmErr').classList.remove('on');
  // Подставляем текущий план в поля нового месяца
  if (S.data) {
    document.getElementById('nmS').value  = S.data.planS  || 0;
    document.getElementById('nmR').value  = S.data.planR  || 0;
    document.getElementById('nmSt').value = S.data.planSt || 0;
    // Считаем долг
    const debtS  = (S.data.planWithDebt ? S.data.planWithDebt[0] : 0) - (S.data.done ? S.data.done[0] : 0);
    const debtR  = (S.data.planWithDebt ? S.data.planWithDebt[1] : 0) - (S.data.done ? S.data.done[1] : 0);
    const debtSt = (S.data.planWithDebt ? S.data.planWithDebt[2] : 0) - (S.data.done ? S.data.done[2] : 0);
    const debtEl = document.getElementById('nmDebt');
    if (debtS > 0 || debtR > 0 || debtSt > 0) {
      const parts = [];
      if (debtS  > 0) parts.push(debtS  + ' стат.');
      if (debtR  > 0) parts.push(debtR  + ' рилс');
      if (debtSt > 0) parts.push(debtSt + ' сторис');
      debtEl.innerHTML = '⚠️ <b>Хвост с прошлого месяца:</b> ' + parts.join(', ');
      debtEl.style.display = '';
    } else {
      debtEl.innerHTML = '✅ <b>Хвост:</b> нет';
      debtEl.style.background = '#F0FDF4';
      debtEl.style.borderColor = '#BBF7D0';
      debtEl.style.color = '#166534';
      debtEl.style.display = '';
    }
  } else {
    document.getElementById('nmS').value=0;
    document.getElementById('nmR').value=0;
    document.getElementById('nmSt').value=0;
    document.getElementById('nmDebt').style.display='none';
  }
  const ov=document.getElementById('nmOverlay');
  ov.style.display='flex';
}
function hideNewMonth(){document.getElementById('nmOverlay').style.display='none';}

async function doNewMonth(){
  const dv=document.getElementById('nmDate').value;
  const err=document.getElementById('nmErr');
  const btn=document.getElementById('nmBtn');
  if(!dv){showFErr(err,'Выбери дату');return;}
  err.classList.remove('on');
  const[y,m,d]=dv.split('-');
  btn.disabled=true;btn.textContent='Создаю…';
  const res=await api('addMonth',{
    projectName:S.proj,
    raschetDay:`${d}.${m}.${y}`,
    planStatic:+document.getElementById('nmS').value||0,
    planReels:+document.getElementById('nmR').value||0,
    planStories:+document.getElementById('nmSt').value||0
  });
  btn.disabled=false;btn.textContent='Создать месяц';
  if(!res.success){showFErr(err,res.error);return;}
  hideNewMonth();
  showToast('Новый месяц создан ✓','ok');
  // Перезагружаем данные проекта
  const fresh=await api('getProject',{projectName:S.proj,date:isoToDmy(dv)});
  if(fresh.success){S.date=isoToDmy(dv);document.getElementById('inputDate').value=dv;document.getElementById('dpill').textContent=fmtDate(S.date);renderProg(fresh);showExistingValues(fresh);}
}
