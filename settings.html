<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diskurs — Настройки</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #F5F7FA; color: #1a1a1a; }

  /* NAV */
  nav { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 0 24px; height: 56px; display: flex; align-items: center; justify-content: space-between; }
  .nav-left { display: flex; align-items: center; gap: 24px; }
  .logo { font-weight: 700; font-size: 18px; color: #1A6BFA; background: #1A6BFA; color: #fff; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { text-decoration: none; color: #6B7280; font-size: 15px; padding: 6px 12px; border-radius: 6px; }
  .nav-links a:hover { background: #F3F4F6; color: #111; }
  .nav-links a.active { color: #1A6BFA; font-weight: 500; }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .user-badge { width: 32px; height: 32px; border-radius: 50%; background: #1A6BFA; color: #fff; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
  .btn-link { background: none; border: none; cursor: pointer; color: #6B7280; font-size: 14px; }
  .btn-link:hover { color: #111; }

  /* PAGE */
  .page { max-width: 720px; margin: 0 auto; padding: 32px 16px; }
  h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .subtitle { color: #6B7280; font-size: 14px; margin-bottom: 28px; }

  /* MY PROJECTS CARD */
  .card { background: #fff; border-radius: 12px; border: 1px solid #E5E7EB; margin-bottom: 20px; overflow: hidden; }
  .card-header { padding: 16px 20px; border-bottom: 1px solid #F3F4F6; display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-weight: 600; font-size: 15px; }
  .card-subtitle { font-size: 13px; color: #6B7280; margin-top: 2px; }
  .card-body { padding: 16px 20px; }

  /* EMPLOYEE ACCORDION (head only) */
  .emp-item { border-bottom: 1px solid #F3F4F6; }
  .emp-item:last-child { border-bottom: none; }
  .emp-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; cursor: pointer; user-select: none; }
  .emp-header:hover { background: #F9FAFB; }
  .emp-name { font-weight: 500; font-size: 15px; }
  .emp-meta { font-size: 13px; color: #6B7280; margin-top: 2px; }
  .emp-chevron { color: #9CA3AF; font-size: 18px; transition: transform 0.2s; }
  .emp-header.open .emp-chevron { transform: rotate(180deg); }
  .emp-body { display: none; padding: 0 20px 16px; }
  .emp-body.open { display: block; }

  /* CHECKBOXES */
  .projects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  @media (max-width: 480px) { .projects-grid { grid-template-columns: 1fr; } }
  .proj-check { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; border: 1px solid #E5E7EB; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
  .proj-check:hover { background: #F3F4F6; }
  .proj-check input[type=checkbox] { width: 16px; height: 16px; accent-color: #1A6BFA; cursor: pointer; flex-shrink: 0; }
  .proj-check label { font-size: 14px; cursor: pointer; line-height: 1.3; }
  .proj-check.checked { background: #EFF4FF; border-color: #C7D7FD; }

  /* ALL toggle */
  .all-toggle { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; font-size: 14px; color: #6B7280; }
  .all-toggle input { accent-color: #1A6BFA; width: 15px; height: 15px; }

  /* SAVE BTN */
  .btn-save { background: #1A6BFA; color: #fff; border: none; border-radius: 8px; padding: 9px 20px; font-size: 14px; font-weight: 500; cursor: pointer; }
  .btn-save:hover { background: #1558d6; }
  .btn-save:disabled { background: #93C5FD; cursor: default; }
  .save-row { display: flex; align-items: center; gap: 12px; }
  .save-msg { font-size: 13px; color: #10B981; display: none; }
  .save-msg.err { color: #EF4444; }

  /* LOADING */
  .loading { text-align: center; padding: 40px; color: #9CA3AF; font-size: 15px; }
</style>
</head>
<body>

<nav>
  <div class="nav-left">
    <div class="logo">D</div>
    <div class="nav-links">
      <a href="projects.html">Проекты</a>
      <a href="status.html">Статус</a>
      <a id="navHead" href="head.html" style="display:none">Хэд</a>
      <a href="help.html">Помощь</a>
    </div>
  </div>
  <div class="nav-right">
    <div class="user-badge" id="userBadge">?</div>
    <span id="userName" style="font-size:14px;font-weight:500"></span>
    <button class="btn-link" onclick="logout()">Выйти</button>
  </div>
</nav>

<div class="page">
  <h1>Настройки</h1>
  <p class="subtitle">Управление проектами сотрудников</p>
  <div id="content" class="loading">Загрузка...</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzc8iimMEq3qw0mDEL9PweBHdLKkIih6TZDGEii3yLTVeJKqCAqX8gTPZLEYR3mZ7TcMA/exec';

function apiCall(params) {
  return new Promise((resolve, reject) => {
    const cb = 'cb_' + Date.now();
    const qs = Object.entries(params).map(([k,v]) => `${k}=${encodeURIComponent(v)}`).join('&');
    const script = document.createElement('script');
    script.src = `${API_URL}?callback=${cb}&${qs}`;
    window[cb] = data => { delete window[cb]; script.remove(); resolve(data); };
    script.onerror = () => reject(new Error('Network error'));
    document.head.appendChild(script);
  });
}

let user = null;
let allProjects = [];
let employees = [];

function init() {
  const raw = sessionStorage.getItem('dsk_user');
  if (!raw) { location.href = 'index.html'; return; }
  user = JSON.parse(raw);
  document.getElementById('userBadge').textContent = user.name[0].toUpperCase();
  document.getElementById('userName').textContent = user.name;
  if (user.role === 'head') document.getElementById('navHead').style.display = '';

  if (user.role === 'head') loadHead();
  else loadSelf();
}

function logout() { sessionStorage.removeItem('dsk_user'); location.href = 'index.html'; }

// ── HEAD: все сотрудники ──
async function loadHead() {
  try {
    const res = await apiCall({ action: 'getEmployees' });
    if (!res.success) { showError(res.error); return; }
    allProjects = res.allProjects || [];
    employees = res.employees || [];
    renderHead();
  } catch(e) { showError(e.message); }
}

function renderHead() {
  const div = document.getElementById('content');
  div.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Проекты сотрудников</div>
          <div class="card-subtitle">Нажми на сотрудника, чтобы изменить его проекты</div>
        </div>
      </div>
      ${employees.map(emp => renderEmpItem(emp)).join('')}
    </div>`;
}

function renderEmpItem(emp) {
  const isAll = emp.projectsFilter.toLowerCase() === 'все' || emp.projectsFilter === '';
  const selected = isAll ? [] : emp.projectsFilter.split(',').map(s => s.trim()).filter(Boolean);
  const id = 'emp_' + emp.login;
  const count = isAll ? 'все проекты' : (selected.length + ' проект' + declension(selected.length));

  const checks = allProjects.map(p => {
    const chk = isAll || selected.includes(p);
    return `<div class="proj-check ${chk ? 'checked' : ''}" onclick="toggleCheck(this)">
      <input type="checkbox" ${chk ? 'checked' : ''} data-project="${p}" onchange="onCheckChange(this,'${emp.login}')">
      <label>${p}</label>
    </div>`;
  }).join('');

  return `
  <div class="emp-item">
    <div class="emp-header" onclick="toggleEmp(this,'${id}')">
      <div>
        <div class="emp-name">${emp.name}</div>
        <div class="emp-meta">${emp.role} · ${count}</div>
      </div>
      <span class="emp-chevron">›</span>
    </div>
    <div class="emp-body" id="${id}">
      <label class="all-toggle">
        <input type="checkbox" id="all_${emp.login}" ${isAll ? 'checked' : ''} onchange="toggleAll(this,'${emp.login}')">
        Все проекты
      </label>
      <div class="projects-grid" id="grid_${emp.login}">${checks}</div>
      <div class="save-row">
        <button class="btn-save" onclick="saveEmployee('${emp.login}')">Сохранить</button>
        <span class="save-msg" id="msg_${emp.login}"></span>
      </div>
    </div>
  </div>`;
}

function toggleEmp(header, bodyId) {
  header.classList.toggle('open');
  document.getElementById(bodyId).classList.toggle('open');
}

function toggleCheck(div) {
  const cb = div.querySelector('input');
  cb.checked = !cb.checked;
  div.classList.toggle('checked', cb.checked);
  cb.dispatchEvent(new Event('change'));
}

function onCheckChange(cb, login) {
  const allCb = document.getElementById('all_' + login);
  const grid = document.getElementById('grid_' + login);
  const all = grid.querySelectorAll('input[type=checkbox]');
  const allChecked = Array.from(all).every(c => c.checked);
  if (allCb) allCb.checked = allChecked;
}

function toggleAll(allCb, login) {
  const grid = document.getElementById('grid_' + login);
  const checks = grid.querySelectorAll('.proj-check');
  checks.forEach(div => {
    const cb = div.querySelector('input');
    cb.checked = allCb.checked;
    div.classList.toggle('checked', allCb.checked);
  });
}

async function saveEmployee(login) {
  const allCb = document.getElementById('all_' + login);
  const grid = document.getElementById('grid_' + login);
  const msgEl = document.getElementById('msg_' + login);

  let filter;
  if (allCb && allCb.checked) {
    filter = 'все';
  } else {
    const checked = Array.from(grid.querySelectorAll('input[type=checkbox]:checked'))
      .map(c => c.dataset.project);
    filter = checked.join(', ');
  }

  msgEl.style.display = 'none';
  try {
    const res = await apiCall({ action: 'saveProjectsFilter', login, projectsFilter: filter });
    if (res.success) {
      msgEl.textContent = '✓ Сохранено';
      msgEl.className = 'save-msg';
      msgEl.style.display = '';
      // Обновляем счётчик в шапке аккордеона
      const emp = employees.find(e => e.login === login);
      if (emp) {
        emp.projectsFilter = filter;
        const count = filter === 'все' ? 'все проекты' : (filter.split(',').length + ' проект' + declension(filter.split(',').length));
        const header = document.querySelector(`[onclick*="emp_${login}"] .emp-meta`);
        if (header) header.textContent = emp.role + ' · ' + count;
      }
      setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
    } else {
      msgEl.textContent = '✗ ' + (res.error || 'Ошибка');
      msgEl.className = 'save-msg err';
      msgEl.style.display = '';
    }
  } catch(e) {
    msgEl.textContent = '✗ Ошибка сети';
    msgEl.className = 'save-msg err';
    msgEl.style.display = '';
  }
}

// ── SELF: обычный сотрудник ──
async function loadSelf() {
  try {
    const res = await apiCall({ action: 'getEmployees' });
    if (!res.success) { showError(res.error); return; }
    allProjects = res.allProjects || [];
    const me = (res.employees || []).find(e => e.login === user.login);
    if (!me) { showError('Не удалось найти данные'); return; }
    renderSelf(me);
  } catch(e) { showError(e.message); }
}

function renderSelf(emp) {
  const isAll = emp.projectsFilter.toLowerCase() === 'все' || emp.projectsFilter === '';
  const selected = isAll ? [] : emp.projectsFilter.split(',').map(s => s.trim()).filter(Boolean);

  const checks = allProjects.map(p => {
    const chk = isAll || selected.includes(p);
    return `<div class="proj-check ${chk ? 'checked' : ''}" onclick="toggleCheckSelf(this)">
      <input type="checkbox" ${chk ? 'checked' : ''} data-project="${p}">
      <label>${p}</label>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header">
        <div>
          <div class="card-title">Мои проекты</div>
          <div class="card-subtitle">Отметь проекты, с которыми ты работаешь</div>
        </div>
      </div>
      <div class="card-body">
        <div class="projects-grid" id="selfGrid">${checks}</div>
        <div class="save-row">
          <button class="btn-save" onclick="saveSelf('${emp.login}')">Сохранить</button>
          <span class="save-msg" id="selfMsg"></span>
        </div>
      </div>
    </div>`;
}

function toggleCheckSelf(div) {
  const cb = div.querySelector('input');
  cb.checked = !cb.checked;
  div.classList.toggle('checked', cb.checked);
}

async function saveSelf(login) {
  const grid = document.getElementById('selfGrid');
  const checked = Array.from(grid.querySelectorAll('input[type=checkbox]:checked'))
    .map(c => c.dataset.project);
  const filter = checked.join(', ');
  const msgEl = document.getElementById('selfMsg');
  msgEl.style.display = 'none';
  try {
    const res = await apiCall({ action: 'saveProjectsFilter', login, projectsFilter: filter });
    if (res.success) {
      // Обновляем sessionStorage
      user.projectsFilter = filter;
      sessionStorage.setItem('dsk_user', JSON.stringify(user));
      msgEl.textContent = '✓ Сохранено';
      msgEl.className = 'save-msg';
      msgEl.style.display = '';
      setTimeout(() => { msgEl.style.display = 'none'; }, 3000);
    } else {
      msgEl.textContent = '✗ ' + (res.error || 'Ошибка');
      msgEl.className = 'save-msg err';
      msgEl.style.display = '';
    }
  } catch(e) {
    msgEl.textContent = '✗ Ошибка сети';
    msgEl.className = 'save-msg err';
    msgEl.style.display = '';
  }
}

function declension(n) {
  if (n % 10 === 1 && n % 100 !== 11) return '';
  if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'а';
  return 'ов';
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div style="color:#EF4444;padding:20px">${msg}</div>`;
}

init();
</script>
</body>
</html>
